<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ea5817" />
    <title>Mutual Aid Toolkit</title>
    <!-- Styles are inlined by main.ts (?raw) so the build is self-contained. -->
  </head>
  <body>
    <!-- The console shell; views render into #app-main. -->
    <header class="app-bar">
      <span class="app-bar__logo"><svg class="bread-loaf" viewBox="0 0 64 44" role="img" aria-label="Mutual Aid Toolkit" xmlns="http://www.w3.org/2000/svg"><path fill="#EA5817" d="M4 40 V26 C4 12.5 16 5 32 5 C48 5 60 12.5 60 26 V40 a3 3 0 0 1-3 3 H7 a3 3 0 0 1-3-3 Z"/><g stroke="#f6f3eb" stroke-width="3" stroke-linecap="round" fill="none"><path d="M20 31 L27.5 16"/><path d="M30 33 L37.5 15"/><path d="M40 32 L47 18"/></g></svg></span>
      <h1 class="app-bar__title">Mutual Aid Toolkit</h1>
      <span class="app-bar__view" id="app-bar-view" aria-live="polite"></span>
    </header>

    <div class="app-layout">
      <nav class="nav" id="app-nav" aria-label="Primary"></nav>
      <main id="app-main" aria-live="polite"></main>
    </div>

    <!-- First-run / loading UI mounts here; removed once the console boots. -->
    <div id="boot-root"></div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
